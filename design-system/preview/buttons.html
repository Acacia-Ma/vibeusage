<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; padding: 8px 0; }
.btn { font-family: var(--font-mono); font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 200ms; border: 1px solid; display: inline-flex; align-items: center; justify-content: center; }
.sm { height: 28px; padding: 0 12px; font-size: 10px; letter-spacing: 0.22em; }
.md { height: 36px; padding: 0 16px; font-size: 11px; letter-spacing: 0.12em; }
.lg { height: 44px; padding: 0 24px; font-size: 13px; letter-spacing: 0.12em; }
.primary { background: var(--ink); color: var(--surface); border-color: var(--ink); }
.default { background: rgba(0,10,0,0.70); color: var(--ink); border-color: rgba(0,255,65,0.18); }
.ghost { background: transparent; color: var(--ink); border-color: transparent; }
.lbl { color: var(--ink-muted); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; min-width: 64px; }
</style></head><body><div class="card">
<div class="row"><div class="lbl">Primary</div>
  <button class="btn primary sm">SYNC</button>
  <button class="btn primary md">vibeusage --sync</button>
  <button class="btn primary lg">INSTALL CLI</button>
</div>
<div class="row"><div class="lbl">Default</div>
  <button class="btn default sm">[F2]</button>
  <button class="btn default md">SHARE TO X</button>
  <button class="btn default lg">VIEW WRAPPED</button>
</div>
<div class="row"><div class="lbl">Ghost</div>
  <button class="btn ghost sm">DAY</button>
  <button class="btn ghost md">WEEK</button>
  <button class="btn ghost lg">MONTH</button>
</div>
</div></body></html>
