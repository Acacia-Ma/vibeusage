<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
:root {
  --warn:       #FFB300;
  --warn-glow:  rgba(255,179,0,0.55);
  --err:        #FF3344;
  --err-glow:   rgba(255,51,68,0.60);
  --idle:       rgba(232,255,233,0.22);
}

.wrap {
  padding: 18px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.row {
  display: grid;
  grid-template-columns: 120px 1fr;
  align-items: center;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid var(--ink-line);
}
.row:last-of-type { border-bottom: 0; }

.cap {
  color: var(--ink-muted);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 700;
}

.dots {
  display: flex;
  align-items: center;
  gap: 14px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  flex-shrink: 0;
}

/* LIVE — green pulse. Covers "online / OK / active". */
.dot.live {
  background: var(--ink);
  box-shadow: 0 0 8px var(--ink-glow);
  animation: pulse 1.4s infinite ease-in-out;
}
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }

/* WARN — amber, slower blink. Degraded / rate-limited. */
.dot.warn {
  background: var(--warn);
  box-shadow: 0 0 8px var(--warn-glow);
  animation: blink-warn 0.9s steps(2) infinite;
}
@keyframes blink-warn { 0%,49% { opacity: 1 } 50%,100% { opacity: 0.25 } }

/* ERR — red, sharp flash. Failure. */
.dot.err {
  background: var(--err);
  box-shadow: 0 0 10px var(--err-glow);
  animation: blink-err 0.5s steps(2) infinite;
}
@keyframes blink-err { 0%,49% { opacity: 1 } 50%,100% { opacity: 0.20 } }

/* OFFLINE — hollow ring, no animation. Disconnected / unknown. */
.dot.off {
  background: transparent;
  box-shadow: inset 0 0 0 1px var(--idle);
}

.legend {
  padding: 12px 20px 16px;
  border-top: 1px solid var(--ink-line);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.legend b { font-weight: 700; }
</style></head>
<body>
<div class="card-shell">
  <div class="card-title"><span>COMPONENTS</span> · STATUS&nbsp;+&nbsp;STATES</div>

  <div class="wrap">

    <div class="row">
      <span class="cap">Live</span>
      <div class="dots"><span class="dot live"></span></div>
    </div>

    <div class="row">
      <span class="cap">Warning</span>
      <div class="dots"><span class="dot warn"></span></div>
    </div>

    <div class="row">
      <span class="cap">Error</span>
      <div class="dots"><span class="dot err"></span></div>
    </div>

    <div class="row">
      <span class="cap">Offline</span>
      <div class="dots"><span class="dot off"></span></div>
    </div>

  </div>

  <div class="legend">
    <span><b style="color:var(--ink)">--ink</b> #00FF41</span>
    <span><b style="color:var(--warn)">--warn</b> #FFB300</span>
    <span><b style="color:var(--err)">--err</b> #FF3344</span>
    <span><b>--idle</b> hollow</span>
  </div>
</div>
</body></html>
