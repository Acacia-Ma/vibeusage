<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.box { padding: 16px; }
.row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--ink-line); }
.tok { color: var(--ink); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 700; width: 70px; flex-shrink: 0; }
.spec { color: var(--ink-bright); flex: 1; font-weight: 700; }
.meta { color: var(--ink-muted); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; }
.tight { letter-spacing: -0.02em; font-size: 24px; }
.data { letter-spacing: 0; font-size: 14px; }
.label { letter-spacing: 0.12em; font-size: 14px; text-transform: uppercase; }
.caps  { letter-spacing: 0.22em; font-size: 12px; text-transform: uppercase; }
</style></head><body><div class="card box">
<div class="row"><div class="tok">tight</div><div class="spec tight">142,892</div><div class="meta">-0.02em</div></div>
<div class="row"><div class="tok">data</div><div class="spec data">vibeusage --sync</div><div class="meta">0</div></div>
<div class="row"><div class="tok">label</div><div class="spec label">Realtime Telemetry</div><div class="meta">0.12em</div></div>
<div class="row" style="border-bottom:0"><div class="tok">caps</div><div class="spec caps">[F2] Snapshot</div><div class="meta">0.22em</div></div>
</div></body></html>
