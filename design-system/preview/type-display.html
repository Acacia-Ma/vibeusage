<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.spec { font-family: var(--font-mono); }

.specimen { color: var(--ink-bright); }

.s0 { font-size: 56px; line-height: 0.95; letter-spacing: -0.03em; font-weight: 900; text-shadow: 0 0 16px rgba(0,255,65,0.4); }
.s1 { font-size: 40px; line-height: 1.0; letter-spacing: -0.02em; font-weight: 900; }
.s2 { font-size: 28px; line-height: 1.05; letter-spacing: -0.02em; font-weight: 900; }
.s3 { font-size: 20px; line-height: 1.10; letter-spacing: -0.02em; font-weight: 900; }
</style></head><body><div class="card spec">
