name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on pull requests and comments
    steps:
      - name: PR Agent
        uses: qodo-ai/pr-agent@v0.34
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pr_reviewer.extra_instructions: >-
            Respond in Simplified Chinese. Prioritize correctness, regressions,
            cross-module contracts, CI and workflow risk, auth or token handling,
            data integrity, and duplicate sources of truth. Call out compatibility
            shims, fallback paths, or scope creep when they appear in a pull request.
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "synchronize", "reopened", "ready_for_review"]'
